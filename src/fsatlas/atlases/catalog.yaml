# fsatlas built-in atlas catalog
# Each atlas entry defines how to acquire, identify, and use the atlas.
#
# Fields:
#   name:        Short identifier used in CLI (e.g., schaefer100-7)
#   description: Human-readable description
#   type:        "surface" (.annot in fsaverage) or "volumetric" (NIfTI in MNI)
#   space:       Source space (fsaverage, MNI152NLin6Asym, MNI152NLin2009cAsym)
#   source_url:  Where to download the atlas files
#   files:       Dict of files to download (key = local name, value = URL or path within archive)
#   labels_tsv:  Optional URL/path to a TSV mapping index -> label name
#   citation:    Short citation string
#   family:      Grouping key for related atlases (e.g., "schaefer2018")

# =============================================================================
# Schaefer 2018 — Local-Global Parcellation (surface-based, fsaverage)
# =============================================================================
# .annot files are available from the CBIG GitHub repo for fsaverage space.

