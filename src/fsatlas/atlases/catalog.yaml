  family: schaefer2018
  description: "Schaefer 2018, 100 parcels, 7-network"
  type: surface
  space: fsaverage
  source_url: "https://github.com/ThomasYeoLab/CBIG/raw/v0.14.3-Update_Yeo2011_Schaefer2018_labelname/stable_projects/brain_parcellation/Schaefer2018_LocalGlobal/Parcellations/FreeSurfer5.3/fsaverage/label"
